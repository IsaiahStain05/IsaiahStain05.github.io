<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8"> 
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <meta name="mobile-web-app-capable" content="yes"> 
    <meta name="apple-mobile-web-app-status-bar-style" content="black"> 
 
    <title>Hippo's Weather App</title> 
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico"> 
    <link rel="apple-touch-icon" href="images/apple-touch-icon-iphone-60x60.png"> 
    <link rel="apple-touch-icon" sizes="60x60" href="images/apple-touch-icon-ipad-76x76.png"> 
    <link rel="apple-touch-icon" sizes="114x114" href="images/apple-touch-icon-iphone-retina-120x120.png"> 
    <link rel="apple-touch-icon" sizes="144x144" href="images/apple-touch-icon-ipad-retina-152x152.png"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous"> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/journal/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="d-flex min-vh-100 justify-content-center align-items-center">
        <div class="card col-sm-12 col-md-8 col-lg-6 bg-secondary-subtle">
            <div class="d-flex card-header align-items-center justify-content-between">
                <h1 class="h1">Hippo Weather App</h1>
                <img src="weatherHippo.svg" alt="Icon" class="col-1">
            </div>
            <form id="querySettings" style="display:block" class="card-body">
                <h4>Location:</h4>
                <hr>
                <div class="d-flex mb-3">
                    <label for="txtLat" class="form-label mx-2 mt-2">Latitude: </label> <input type="text" id="txtLat" placeholder="Latitude" class="form-control" required>
                    <label for="txtLong" class="form-label mx-2 mt-2">Longitude: </label> <input type="text" id="txtLong" placeholder="Longitude" class="form-control" required>
                </div>
                <h4>Settings:</h4>
                <hr>
                <div class="mt-2">
                    <div class="d-flex align-items-center">
                        <label for="txtTempUnit" class="form-label me-2">Temperature Unit:</label>
                        <select name="txtTempUnit" id="txtTempUnit" class="form-select me-2">
                            <option value="fahrenheit" selected>°F</option>
                            <option value="">°C</option>
                        </select>
                        <label for="txtTimeZone" class="form-label mx-2">Time Zone:</label>
                        <select name="timezone" id="txtTimeZone" class="form-select">
                            <option value="">Not set (GMT+0)</option>
                            <option value="auto">Automatically detect time zone</option>
                            <option value="GMT">GMT+0</option>
                            <option value="America%2FAnchorage">America - Anchorage</option>
                            <option value="America%2FLos_Angeles">America - Los Angeles</option>
                            <option value="America%2FDenver">America - Denver</option>
                            <option value="America%2FChicago" selected>America - Chicago</option>
                            <option value="America%2FNew_York">America - New York</option>
                            <option value="America%2FSao_Paulo">America - Sao Paulo</option>
                            <option value="Europe%2FLondon">Europe - London</option>
                            <option value="Europe%2FBerlin">Europe - Berlin</option>
                            <option value="Europe%2FMoscow">Europe - Moscow</option>
                            <option value="Africa%2FCairo">Africa - Cairo</option>
                            <option value="Asia%2FBangkok">Asia - Bangkok</option>
                            <option value="Asia%2FSingapore">Asia - Singapore</option>
                            <option value="Asia%2FTokyo">Asia - Tokyo</option>
                            <option value="Australia%2FSydney">Australia - Sydney</option>
                            <option value="Pacific%2FAuckland">Pacific - Auckland</option>
                        </select>
                    </div>
                    <div class="d-flex align-items-center mt-3">
                        <label for="txtWindSpdUnit" class="form-label me-2">Wind Speed Unit:</label>
                        <select name="txtWindSpdUnit" id="txtWindSpdUnit" class="form-select me-2">
                            <option value="">km/h</option>
                            <option value="ms">m/s</option>
                            <option value="mph" selected>mph</option>
                            <option value="kn">Knots</option>
                        </select>
                        <label for="txtPrecipUnit" class="form-label mx-2">Precipitation Unit:</label>
                        <select name="txtPrecipUnit" id="txtPrecipUnit" class="form-select">
                            <option value="">Millimeter</option>
                            <option value="inch" selected>Inch</option>
                        </select>
                    </div>
                    <div class="d-flex justify-content-center">
                        <button id="btnSubmit" type="button" class="btn btn-primary col-11" aria-label="Submit">Submit</button>
                    </div>
                </div>
            </form>
            <div id="forecastData" style="display:none" class="card-body" aria-live="polite">
                <div id="currWeatherBox">
                    <h4 class="h4">Current Weather</h4>
                    <hr>
                    <div id="currWeather" class="card-body justify-content-center"></div>
                </div>
                <div id="dailyWeather">
                    <h4 class="h4">Daily Weather:</h4>
                    <hr>
                    <div id="dailyCards" class="d-flex overflow-x-auto mb-3"></div>
                </div>
                <div id="hourlyWeather" class="mt-2">
                    <h4 class="h4">Hourly Weather:</h4>
                    <hr>
                    <div id="hourlyCards" class="d-flex overflow-x-auto"></div>
                </div>
                <hr class="hr"></hr>
                <h6 class="h6 fw-light fst-italic text-center">Data courtesy of the <a href="https://open-meteo.com/" target="_blank">Open-Meteo API</a></h6>
            </div>
        </div>
    </div>

                		}
                	}
                }  
            const now = new Date()
            let hourlyInnerHtml = ''
            let dailyInnerHtml = ''
            let normalUrl = `${WEATHER_API_BASE_URL}latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_min,temperature_2m_max,sunrise,sunset,precipitation_probability_max&hourly=temperature_2m,precipitation_probability,relative_humidity_2m,precipitation,weather_code,wind_speed_10m&current=temperature_2m,relative_humidity_2m,precipitation,weather_code,wind_speed_10m`

            if(timezone != ""){
                normalUrl += `&timezone=${timezone}`
            }

            if(windSpdUnit != ""){
                normalUrl += `&wind_speed_unit=${windSpdUnit}`
            }

            if(tempUnit != ""){
                normalUrl += `&temperature_unit=${tempUnit}`
            }

            if(precipUnit != ""){
                normalUrl += `&precipitation_unit=${precipUnit}`
            }

            let fetchResponse = await fetch(normalUrl)
            let data = await fetchResponse.json()
            let currTime = new Date(data.current.time).toLocaleString()
            let windUnit = data.current_units.wind_speed_10m
            if(windUnit == "mp/h"){
                windUnit = "mph"
            }
            document.querySelector('#currWeather').innerHTML = 
                `
                <div class="card d-flex bg-primary bg-opacity-25" tabindex="0" aria-label="Current temperature at latitude: ${data.latitude}, longitude: ${data.longitude} at ${currTime}. Temperature: ${data.current.temperature_2m}${data.current_units.temperature_2m}. Humidity: ${data.current.relative_humidity_2m}${data.current_units.relative_humidity_2m}. Weather conditions: ${weatherCodeInd[data.current.weather_code].day.description}.">

                            <p>Latitude = ${data.latitude}, Longitude = ${data.longitude}</p>

                        </div>
                        <vr class="vr d-none d-md-block"></vr>
                        <hr class="hr d-block d-md-none"></hr>
                        <div class="justify-content-start">

                            <p class="text-start"><i class="bi bi-wind me-3"></i> Wind Speed : ${data.current.wind_speed_10m}${windUnit}</p>
                            <p class="text-start"><i class="bi bi-umbrella-fill me-3"></i> ${data.current.precipitation} ${data.current_units.precipitation}</p>
                        </div>
                    </div>
                    <button id="btnNewLocation" class="btn btn-primary col-12" aria-label="Get Weather for a New Location">Get Weather for a New Location</button>
                </div>
                `
                document.querySelector('#btnNewLocation').addEventListener('click', () => {
                    document.querySelector('#forecastData').style = "display: none"
                    document.querySelector('#querySettings').style = "display: block"
                })
            data.daily.time.forEach((element, index) => {
                let time = new Date(data.daily.time[index])
                if(time >= now){
                    time = time.toLocaleString()
                    let sunrise = new Date(data.daily.sunrise[index]).toLocaleTimeString()
                    let sunset = new Date(data.daily.sunset[index]).toLocaleTimeString()
                    dailyInnerHtml +=

                        <div class="card col-6 mx-2 border shadow border-primary rounded bg-primary bg-opacity-25" tabindex="0" role="group" aria-label="Daily Forecast for ${time}. High: ${data.daily.temperature_2m_max[index]}${data.daily_units.temperature_2m_min}. Low: ${data.daily.temperature_2m_min[index]}${data.daily_units.temperature_2m_min}. ${data.daily.precipitation_probability_max[index]}% chance of precipitation. Weather Conditions: ${weatherCodeInd[data.daily.weather_code[index]].day.description}.">
                            <div class="card-body d-block-flex text-center">
                                <div class="mt-2 text-center">
                                    <p>${time}</p>
                                    <hr>
                                </div>
                                <div class="justify-content-center text-center mx-1">
                                    <p class="fw-bold"> ${data.daily.temperature_2m_max[index]} ${data.daily_units.temperature_2m_min}</p>
                                    <p class="fw-light"> ${data.daily.temperature_2m_min[index]} ${data.daily_units.temperature_2m_min}</p>
                                    <p>Weather Conditions: </p>
                                    <p>${weatherCodeInd[data.daily.weather_code[index]].day.description} <img src="${weatherCodeInd[data.daily.weather_code[index]].day.image}" alt="Weather Condition: ${weatherCodeInd[data.daily.weather_code[index]].day.description}"</p>
                                    <p>Precipitation Prob: ${data.daily.precipitation_probability_max[index]}% </p>
                                    <div class="d-flex justify-content-center">
                                        <i class="bi bi-sunrise">  ${sunrise} ----- ${sunset}  <i class="bi bi-sunset"></i></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        `
                }
            })
            data.hourly.time.forEach((element, index) => {
                let time = new Date(element)
                if(time >= now){
                    time = time.toLocaleString()
                    let windUnit = data.hourly_units.wind_speed_10m
                    if(windUnit == "mp/h"){
                        windUnit = "mph"
                    }
                    hourlyInnerHtml += 
                        `
                        <div class="card col-6 mx-2 border shadow border-primary rounded bg-primary bg-opacity-25" tabindex="0" role="group" aria-label="Hourly Forecast for ${time}. Temp: ${data.hourly.temperature_2m[index]}${data.hourly_units.temperature_2m}. ${data.hourly.precipitation_probability[index]}% chance of precipitation. Weather Conditions: ${weatherCodeInd[data.hourly.weather_code[index]].day.description}.">
                            <div class="card-body d-block-flex text-center">
                                <div class="mt-2 text-center">
                                    <p>${time}</p>
                                    <hr>
                                </div>
                                <div class="text-center">
                                    <p>Temp: ${data.hourly.temperature_2m[index]}${data.hourly_units.temperature_2m}   Humidity: ${data.hourly.relative_humidity_2m[index]}${data.hourly_units.relative_humidity_2m}</p>
                                    <p>Weather Conditions: </p>
                                    <p>${weatherCodeInd[data.hourly.weather_code[index]].day.description} <img src="${weatherCodeInd[data.hourly.weather_code[index]].day.image}" alt="Weather Condition: ${weatherCodeInd[data.hourly.weather_code[index]].day.description}"</p>
                                    <p>Wind: ${data.hourly.wind_speed_10m[index]}${windUnit}</p>
                                    <p>Precipitation:</p>
                                    <p>Prob: ${data.hourly.precipitation_probability[index]}%  Amount: ${data.hourly.precipitation[index]} ${data.hourly_units.precipitation}</p>
                                </div>
                            </div>
                        </div>
                        `
                }
            })
            document.querySelector('#dailyCards').innerHTML = dailyInnerHtml
            document.querySelector('#hourlyCards').innerHTML = hourlyInnerHtml
            document.querySelector('#querySettings').style = "display:none"
            document.querySelector('#forecastData').style = "display:block"
        })
    </script>
</body>
</html>
